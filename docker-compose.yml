services:
  web:
    build:
      context: .
      args:
        INSTALL_CALIBRE: ${INSTALL_CALIBRE:-1}
    ports:
      - "8008:8000"
    environment:
      DATABASE_PATH: /app/data/library.db
      DATA_DIR: /app/data
      LIBRARY_DIR: /app/data/books
      NEW_BOOKS_DIR: /app/data/new_books
      COVERS_DIR: /app/data/covers
      CALIBRE_EBOOK_META: ${CALIBRE_EBOOK_META:-}
      CALIBRE_EBOOK_CONVERT: ${CALIBRE_EBOOK_CONVERT:-}
    volumes:
      - .:/app
      - ./data:/app/data
