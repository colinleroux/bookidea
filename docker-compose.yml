services:
  web:
    build: .
    ports:
      - "5000"
    volumes:
      - .:/app
      - ./books:/books
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: books
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  nginx:
    image: nginx:latest
    ports:
      - "5000:5000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./books:/books
    depends_on:
      - web
