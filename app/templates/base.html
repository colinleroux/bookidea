<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Library{% endblock %}</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-stone-100 text-stone-900">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(120,53,15,0.12),_transparent_40%),linear-gradient(180deg,_#f7f2e8_0%,_#f2ece1_45%,_#e5dccd_100%)]">
        <header class="border-b border-stone-300/70 bg-white/70 backdrop-blur">
            <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5">
                <div>
                    <a href="{{ url_for('main.index') }}" class="text-2xl font-semibold tracking-tight text-stone-900">Library Atelier</a>
                    <p class="text-sm text-stone-600">A calm home for your book collection</p>
                </div>
                <nav class="flex flex-wrap items-center gap-3 text-sm font-medium text-stone-700">
                    <a href="{{ url_for('main.index') }}" class="rounded-full px-4 py-2 transition hover:bg-stone-200">Library</a>
                    <a href="{{ url_for('main.manage_books') }}" class="rounded-full px-4 py-2 transition hover:bg-stone-200">Manage Books</a>
                    <a href="{{ url_for('main.manage_categories') }}" class="rounded-full px-4 py-2 transition hover:bg-stone-200">Categories</a>
                </nav>
            </div>
        </header>

        <main class="mx-auto max-w-7xl px-6 py-8">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-6 space-y-3">
                        {% for category, message in messages %}
                            <div class="rounded-2xl border border-stone-300 bg-white px-4 py-3 text-sm text-stone-700 shadow-sm">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
